<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trend Forecast & Notes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Trend Forecast</h1>
  <form id="forecastForm">
    <input type="number" id="horizon" placeholder="Prediction Horizon" value="30">
    <button type="submit">Run Forecast</button>
  </form>
  <div id="forecastResult" class="card"></div>

  <h1>Login</h1>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button type="submit">Login</button>
  </form>
  <div id="loginResult"></div>

  <h1>Notes</h1>
  <form id="noteForm">
    <input type="text" id="noteTitle" placeholder="Title">
    <textarea id="noteContent" placeholder="Content"></textarea>
    <input type="date" id="noteDate">
    <input type="number" id="noteValue" placeholder="Value">
    <button type="submit">Add Note</button>
  </form>
  <div id="notesList"></div>

  <!-- RAG section removed from HTML -->

  <script type="module" src="script.js"></script>
</body>
</html>
