<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trend Forecast & RAG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Trend Forecast</h1>
  <form id="forecastForm">
    <input type="text" id="domain" placeholder="Domain" value="general">
    <input type="text" id="keywords" placeholder="Keywords (comma separated)" value="AI,machine learning">
    <input type="number" id="horizon" placeholder="Prediction Horizon" value="30">
    <button type="submit">Run Forecast</button>
  </form>
  <pre id="forecastResult"></pre>

  <h1>RAG Query</h1>
  <form id="ragForm">
    <input type="text" id="ragKeyword" placeholder="Keyword" value="artificial intelligence">
    <button type="submit">Run RAG</button>
  </form>
  <pre id="ragResult"></pre>

  <script src="script.js"></script>
</body>
</html>
