<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Trend Forecast</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >
</head>

<body class="auth-body">

  <div class="auth-card">

    <h1>📈 Trend Forecast</h1>

    <p class="subtitle">
      Predict future trends from your notes and data.
    </p>

    <img
      src="login-illustration.png"
      alt="Trend Forecast"
      class="hero-img"
    >

    <h2>Create Account</h2>

    <form id="signupForm">
      <input
        type="email"
        id="signupEmail"
        placeholder="Email Address"
        required
      >

      <input
        type="password"
        id="signupPassword"
        placeholder="Password"
        required
      >

      <button type="submit">
        <i class="fas fa-user-plus"></i>
        Create Account
      </button>
    </form>

    <div id="signupResult"></div>

    <div class="divider">
      <span>OR</span>
    </div>

    <h2>Login</h2>

    <form id="loginForm">
      <input
        type="email"
        id="email"
        placeholder="Email Address"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      >

      <button type="submit">
        <i class="fas fa-right-to-bracket"></i>
        Login
      </button>
    </form>

    <div id="loginResult"></div>

  </div>

  <script type="module" src="auth.js"></script>

</body>
</html>
</html>
