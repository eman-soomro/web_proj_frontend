<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <link rel="stylesheet" href="style.css">

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dashboard-body">

  <aside class="sidebar">
    <h2>📊 Trend</h2>

    <button onclick="showSection('notesSection')">Notes</button>
    <button onclick="showSection('predictionSection')">Forecast</button>
  </aside>

  <main class="main">

    <div class="topbar">
      <h1>Dashboard</h1>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <h3>Total Notes</h3>
        <p id="totalNotes">0</p>
      </div>

      <div class="stat-card">
        <h3>Latest Value</h3>
        <p id="latestValue">0</p>
      </div>
    </div>

    <section id="notesSection">

      <form id="noteForm">
        <input id="noteTitle" placeholder="Title">
        <textarea id="noteContent" placeholder="Content"></textarea>
        <input type="date" id="noteDate">
        <input type="number" id="noteValue" placeholder="Value">
        <button>Add</button>
      </form>

      <div id="notesList"></div>

    </section>

    <section id="predictionSection" style="display:none;">
      <form id="forecastForm">
        <input type="number" id="horizon" value="30">
        <button>Run Forecast</button>
      </form>

      <canvas id="forecastChart"></canvas>
    </section>

  </main>

  <script src="dashboard.js"></script>

</body>
</html>
