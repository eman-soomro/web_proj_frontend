<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <link rel="stylesheet" href="style.css">

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="dashboard-body">

  <aside class="sidebar">
    <h2>📒 Trend</h2>

    <button onclick="showSection('notesSection')">
      <i class="fa fa-note-sticky"></i> Notes
    </button>

    <button onclick="showSection('predictionSection')">
      <i class="fa fa-chart-line"></i> Forecast
    </button>
  </aside>

  <main class="main">

    <div class="topbar">
      <div>
        <h1>Dashboard</h1>
        <p>Analyze your trends</p>
      </div>

      <button onclick="logout()">Logout</button>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <h3>Total Notes</h3>
        <p id="totalNotes">0</p>
      </div>

      <div class="stat-card">
        <h3>Latest Value</h3>
        <p id="latestValue">0</p>
      </div>
    </div>

    <!-- NOTES -->
    <section id="notesSection">

      <h2>Notes</h2>

      <form id="noteForm">
        <input id="noteTitle" placeholder="Title">
        <textarea id="noteContent" placeholder="Content"></textarea>
        <input type="date" id="noteDate">
        <input type="number" id="noteValue" placeholder="Value">
        <button>Add Note</button>
      </form>

      <div id="notesList"></div>
    </section>

    <!-- FORECAST -->
    <section id="predictionSection" style="display:none;">
      <h2>Forecast</h2>

      <form id="forecastForm">
        <input type="number" id="horizon" value="30">
        <button>Run Forecast</button>
      </form>

      <canvas id="forecastChart"></canvas>
    </section>

  </main>

  <script src="dashboard.js"></script>
</body>
</html>
</html>
