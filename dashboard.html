<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Trend Forecast Dashboard</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >
</head>

<body class="dashboard-body">

  <aside class="sidebar">

    <div class="logo">
      📈 Trend Forecast
    </div>

    <button onclick="showSection('notesSection')">
      <i class="fas fa-note-sticky"></i>
      Notes
    </button>

    <button onclick="showSection('predictionSection')">
      <i class="fas fa-chart-line"></i>
      Forecast
    </button>

  </aside>

  <main class="main">

    <div class="topbar">

      <div>
        <h1>Dashboard</h1>
        <p>Analyze trends and generate predictions</p>
      </div>

      <button id="logoutBtn">
        <i class="fas fa-right-from-bracket"></i>
        Logout
      </button>

    </div>

    <div class="stats">

      <div class="stat-card">
        <h3>Total Notes</h3>
        <p id="totalNotes">0</p>
      </div>

      <div class="stat-card">
        <h3>Latest Value</h3>
        <p id="latestValue">0</p>
      </div>

      <div class="stat-card">
        <h3>Forecast Ready</h3>
        <p>✓</p>
      </div>

    </div>

    <!-- Notes -->

    <section id="notesSection">

      <h2 class="section-title">My Notes</h2>

      <form id="noteForm">

        <input
          type="text"
          id="noteTitle"
          placeholder="Note Title"
          required
        >

        <textarea
          id="noteContent"
          placeholder="Write something..."
          rows="4"
        ></textarea>

        <input
          type="date"
          id="noteDate"
          required
        >

        <input
          type="number"
          id="noteValue"
          placeholder="Value"
          required
        >

        <button type="submit">
          Add Note
        </button>

      </form>

      <div id="notesList"></div>

    </section>

    <!-- Forecast -->

    <section
      id="predictionSection"
      style="display:none;"
    >

      <h2 class="section-title">
        Trend Forecast
      </h2>

      <form id="forecastForm">

        <input
          type="number"
          id="horizon"
          value="30"
          placeholder="Prediction Days"
        >

        <button type="submit">
          Run Forecast
        </button>

      </form>

      <div class="chart-card">
        <canvas id="forecastChart"></canvas>
      </div>

    </section>

  </main>

  <script type="module" src="dashboard.js"></script>

</body>
</html>
</html>
